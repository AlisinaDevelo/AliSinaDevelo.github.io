# Validates every PR (and non-main pushes) so broken changes never reach main unnoticed.
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
      - gh-pages

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
